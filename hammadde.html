<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İplik ERP - Bulut Kayıt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body class="bg-slate-50 pb-12">
    <header class="bg-indigo-900 text-white p-6 flex justify-between items-center shadow-xl">
        <h1 class="font-black">BULUT FİYAT YÖNETİMİ</h1>
        <a href="index.html" class="bg-white text-indigo-900 px-4 py-2 rounded font-bold text-sm">Hesaplamaya Dön</a>
    </header>

    <div class="max-w-4xl mx-auto mt-8 p-6 bg-white rounded-xl shadow-md">
        <h2 class="text-xs font-black text-slate-400 uppercase mb-4">Yeni PDF Yükle ve Buluta Gönder</h2>
        <input type="file" id="pdf-file" accept="application/pdf" class="hidden" onchange="pdfOku(event)">
        <button onclick="document.getElementById('pdf-file').click()" class="w-full border-2 border-dashed border-indigo-200 p-10 rounded-xl font-bold text-indigo-600 hover:bg-indigo-50 transition-all">PDF DOSYASI SEÇ</button>
        
        <div id="loading" class="hidden mt-4 text-center font-bold text-orange-500 animate-bounce">BULUTA KAYDEDİLİYOR...</div>
    </div>

    <script>
        const SUPABASE_URL = 'BURAYA_SUPABASE_URL_GELECEK';
        const SUPABASE_KEY = 'BURAYA_SUPABASE_ANON_KEY_GELECEK';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function pdfOku(e) {
            const file = e.target.files[0];
            const fr = new FileReader();
            fr.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++){
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    content.items.forEach(item => text += item.str + " ");
                }
                bulutaYaz(text);
            };
            fr.readAsArrayBuffer(file);
        }

        async function bulutaYaz(hamMetin) {
            document.getElementById('loading').classList.remove('hidden');
            const lines = hamMetin.split('\n');
            const dataToUpload = [];

            // Basit Regex ile İplik ve Fiyat ayıklama
            const matches = [...hamMetin.matchAll(/(.+?)\s+(\d+[.,]\d{2,3})/g)];
            matches.forEach(m => {
                dataToUpload.push({ cins: m[1].trim().toUpperCase(), fiyat: m[2].replace(',','.') });
            });

            // Supabase'e toplu yükleme (Aynı isim varsa üzerine yazar)
            const { error } = await supabase.from('iplik_fiyatlari').upsert(dataToUpload, { onConflict: 'cins' });
            
            if(!error) alert("Başarıyla Buluta Kaydedildi! Artık her cihazda güncel.");
            else alert("Hata: " + error.message);
            document.getElementById('loading').classList.add('hidden');
        }
    </script>
</body>
</html>
