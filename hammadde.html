<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İplik ERP - Bulut Kayıt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 pb-12 font-['Inter'] text-slate-800">
    <header class="bg-indigo-900 text-white p-6 flex flex-col md:flex-row justify-between items-center shadow-xl gap-4">
        <h1 class="font-black tracking-tighter uppercase text-xl text-center">İplik Fiyat Listesi Aktarımı (Bulut)</h1>
        <div class="flex gap-2">
            <a href="index.html" class="bg-white text-indigo-900 px-6 py-2 rounded-lg font-bold text-sm shadow-md hover:bg-slate-100 transition-all text-center">HESAPLAMAYA DÖN</a>
            <button onclick="if(confirm('TÜM BULUT VERİLERİNİ SİLEYİM Mİ?')) silTumu();" class="bg-red-500 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md hover:bg-red-600 transition-all">TÜMÜNÜ SİL</button>
        </div>
    </header>

    <div class="max-w-4xl mx-auto mt-8 p-6 bg-white rounded-2xl shadow-lg border border-slate-200">
        <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">PDF Dosyasını Bulut Veritabanına Gönder</h2>
        
        <input type="file" id="pdf-file" accept="application/pdf" class="hidden" onchange="pdfIsle(event)">
        <button onclick="document.getElementById('pdf-file').click()" class="w-full border-4 border-dashed border-indigo-100 p-12 rounded-2xl font-black text-indigo-500 hover:bg-indigo-50 transition-all text-xl">PDF DOSYASI SEÇ VE YÜKLE</button>
        
        <div id="loading" class="hidden mt-6 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-500 border-t-transparent"></div>
            <p class="mt-2 font-black text-indigo-600 animate-pulse uppercase text-xs">İşleniyor...</p>
        </div>
        
        <textarea id="raw-text" class="w-full mt-4 h-32 bg-slate-50 border p-3 rounded-lg font-mono text-[10px]" placeholder="Ham metin analizi..."></textarea>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        const SUPABASE_URL = 'https://nejpygqdwbjuwsauacsw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lanB5Z3Fkd2JqdXdzYXVhY3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQzNzQsImV4cCI6MjA5MjE5MDM3NH0.bJuosfe7jqbu4RvsCtV2I-GK8Xsh2oeNRvIXDXoCYD8';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function pdfIsle(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('loading').classList.remove('hidden');

            const fr = new FileReader();
            fr.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++){
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    let lastY = -1;
                    content.items.sort((a,b) => b.transform[5]-a.transform[5] || a.transform[4]-b.transform[4]).forEach(item => {
                        if(Math.abs(item.transform[5]-lastY) > 5 && lastY!==-1) text += "\n";
                        text += item.str + " ";
                        lastY = item.transform[5];
                    });
                    text += "\n";
                }
                document.getElementById('raw-text').value = text;
                ayiklaVeKaydet(text);
            };
            fr.readAsArrayBuffer(file);
        }

        async function ayiklaVeKaydet(metin) {
            const data = [];
            const lines = metin.split('\n');
            
            lines.forEach(line => {
                const regex = /(.+?)\s+(\d+[.,]\d{2,3})(?:\s+usd|\s+\$|\s+tl)?/gi;
                let match;
                while ((match = regex.exec(line)) !== null) {
                    let isim = match[1].trim().replace(/^\d+[\s.|\-)]+/, "").toUpperCase();
                    let fiyat = match[2].replace(',','.');
                    if (isim.length > 3) data.push({ cins: isim, fiyat: fiyat });
                }
            });

            const { error } = await client.from('iplik_fiyatlari').upsert(data, { onConflict: 'cins' });
            
            if(!error) alert(data.length + " İplik Kaydedildi!");
            else alert("Hata: " + error.message);
            document.getElementById('loading').classList.add('hidden');
        }

        async function silTumu() {
            const { error } = await client.from('iplik_fiyatlari').delete().neq('cins', '0');
            if(!error) alert("Tüm bulut verileri silindi.");
            else alert("Silme hatası.");
        }
    </script>
</body>
</html>
