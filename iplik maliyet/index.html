<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İplik Üretim Maliyet Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <div class="max-w-6xl mx-auto py-8 px-4">
        <header class="header-gradient rounded-2xl p-8 mb-8 shadow-lg text-white">
            <h1 class="text-3xl font-bold flex items-center gap-3">
                <span>🧵</span> İplik Maliyet Takip Sistemi
            </h1>
            <p class="mt-2 text-blue-100 opacity-80">
                Hasbera, Adeko, Zorlu ve Aymes Numuneleri İçin Dinamik Panel
            </p>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                </svg>
                Hesaplama Parametreleri
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">⚡ KW Birim Fiyatı ($/₺)</label>
                    <input type="number" id="kw_fiyat" value="1.50" step="0.01" class="w-full border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2.5 border outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">👥 İşçilik Endeks Oranı (%)</label>
                    <input type="number" id="iscilik_fiyat" value="100" class="w-full border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2.5 border outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">📈 Kar Hedefi (%)</label>
                    <input type="number" id="kar_orani" value="20" class="w-full border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2.5 border outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">📂 İplik Türü</label>
                    <select id="iplik_filtre" class="w-full border-slate-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2.5 border outline-none">
                        <option value="Tümü">Tüm Gruplar</option>
                        <option value="Düz Büküm">Düz Büküm</option>
                        <option value="Krep">Krep</option>
                        <option value="Flash">Flash</option>
                        <option value="Kar">Kar</option>
                    </select>
                </div>
            </div>
            <div class="mt-6 flex justify-end">
                <button onclick="maliyetHesapla()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all active:scale-95">
                    Maliyetleri Güncelle
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">İplik Türü</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Denye</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Enerji (₺)</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">İşçilik (₺)</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-blue-600 uppercase tracking-wider">Net Maliyet</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-green-600 uppercase tracking-wider">Satış Fiyatı</th>
                    </tr>
                </thead>
                <tbody id="sonuc_tablosu" class="bg-white divide-y divide-slate-100">
                    <tr><td colspan="6" class="px-6 py-10 text-center text-slate-400">Verileri yüklemek için butona tıklayın...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- SUPABASE BAĞLANTI BİLGİLERİ ---
        const SUPABASE_URL = 'https://nejpygqdwbjuwsauacsw.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lanB5Z3Fkd2JqdXdzYXVhY3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQzNzQsImV4cCI6MjA5MjE5MDM3NH0.bJuosfe7jqbu4RvsCtV2I-GK8Xsh2oeNRvIXDXoCYD8';
        // -----------------------------------

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function maliyetHesapla() {
            const tablo = document.getElementById('sonuc_tablosu');
            tablo.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-slate-400 italic animate-pulse">Supabase bulut veritabanından güncel veriler çekiliyor...</td></tr>';

            const kwFiyat = parseFloat(document.getElementById('kw_fiyat').value) || 0;
            const iscilikEndeks = parseFloat(document.getElementById('iscilik_fiyat').value) || 100;
            const karOrani = parseFloat(document.getElementById('kar_orani').value) || 20;
            const filtre = document.getElementById('iplik_filtre').value;

            try {
                let query = supabaseClient.from('iplik_maliyetleri').select('*');
                if (filtre !== 'Tümü') {
                    query = query.eq('iplik_tipi', filtre);
                }

                const { data, error } = await query;
                if (error) throw error;

                tablo.innerHTML = '';

                if (data.length === 0) {
                    tablo.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-orange-500 font-semibold">SQL Editor kısmına yapıştırdığımız örnek veriler bulunamadı. Lütfen Supabase SQL Editor\'den kodları tekrar çalıştırın.</td></tr>';
                    return;
                }

                data.forEach(satir => {
                    const enerjiMaliyeti = (satir.kw_tuketim || 0) * kwFiyat;
                    const iscilikMaliyeti = (satir.iscilik || 0) * (iscilikEndeks / 100);
                    const netMaliyet = enerjiMaliyeti + iscilikMaliyeti;
                    const satisFiyati = netMaliyet * (1 + (karOrani / 100));

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold">${satir.iplik_tipi}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">${satir.denye}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 font-mono">${enerjiMaliyeti.toFixed(3)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500 font-mono">${iscilikMaliyeti.toFixed(3)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-blue-700">${netMaliyet.toFixed(3)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-green-700 font-semibold">${satisFiyati.toFixed(3)}</td>
                    `;
                    tablo.appendChild(tr);
                });
            } catch (error) {
                console.error("Hata:", error);
                tablo.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-red-500 font-bold">⚠️ Bağlantı Başarısız! Lütfen Supabase tarafında SQL kodlarını çalıştırdığınızdan emin olun.</td></tr>';
            }
        }
    </script>
</body>
</html>
