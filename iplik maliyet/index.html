<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İplik Üretim Maliyet Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .header-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <div class="max-w-6xl mx-auto py-8 px-4">
        <header class="header-gradient rounded-2xl p-8 mb-8 shadow-lg text-white text-center">
            <h1 class="text-3xl font-bold flex items-center justify-center gap-3">
                <span>🧵</span> İplik Maliyet Takip Sistemi
            </h1>
            <p class="mt-2 text-blue-100 opacity-80 text-lg">Düz Büküm, Krep, Flash ve Kar Serileri</p>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">⚡ KW Birim ($/₺)</label>
                    <input type="number" id="kw_fiyat" value="1.50" step="0.01" class="w-full border-slate-300 rounded-lg p-2.5 border outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">👥 İşçilik Endeksi (%)</label>
                    <input type="number" id="iscilik_fiyat" value="100" class="w-full border-slate-300 rounded-lg p-2.5 border outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">📈 Kar Hedefi (%)</label>
                    <input type="number" id="kar_orani" value="20" class="w-full border-slate-300 rounded-lg p-2.5 border outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">📂 İplik Türü</label>
                    <select id="iplik_filtre" class="w-full border-slate-300 rounded-lg p-2.5 border outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Tümü">Tümü</option>
                        <option value="Düz Büküm">Düz Büküm</option>
                        <option value="Krep">Krep</option>
                        <option value="Flash">Flash</option>
                        <option value="Kar">Kar</option>
                    </select>
                </div>
            </div>
            <div class="mt-6 flex justify-center">
                <button onclick="maliyetHesapla()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-xl shadow-md active:scale-95 transition-all text-lg">
                    📊 Verileri Getir ve Hesapla
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-800 text-white">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase">İplik Türü</th>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase">Denye</th>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase">Enerji (₺)</th>
                        <th class="px-6 py-4 text-left text-xs font-bold uppercase">İşçilik (₺)</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-blue-300 uppercase">Net Maliyet</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-green-300 uppercase">Satış Fiyatı</th>
                    </tr>
                </thead>
                <tbody id="sonuc_tablosu" class="bg-white divide-y divide-slate-100">
                    <tr><td colspan="6" class="px-6 py-10 text-center text-slate-400 italic">Verileri çekmek için butona basın...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Sizin projelerinizden aldığımız özel bağlantı bilgileri:
        const SUPABASE_URL = 'https://nejpygqdwbjuwsauacsw.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lanB5Z3Fkd2JqdXdzYXVhY3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQzNzQsImV4cCI6MjA5MjE5MDM3NH0.bJuosfe7jqbu4RvsCtV2I-GK8Xsh2oeNRvIXDXoCYD8';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function maliyetHesapla() {
            const tablo = document.getElementById('sonuc_tablosu');
            tablo.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center"><div class="animate-spin h-8 w-8 border-4 border-blue-600 border-t-transparent rounded-full mx-auto"></div></td></tr>';

            const kwFiyat = parseFloat(document.getElementById('kw_fiyat').value) || 0;
            const iscilikEndeks = parseFloat(document.getElementById('iscilik_fiyat').value) || 100;
            const karOrani = parseFloat(document.getElementById('kar_orani').value) || 20;
            const filtre = document.getElementById('iplik_filtre').value;

            try {
                let query = supabaseClient.from('iplik_maliyetleri').select('*');
                if (filtre !== 'Tümü') query = query.eq('iplik_tipi', filtre);

                const { data, error } = await query;
                if (error) throw error;

                tablo.innerHTML = data.length === 0 ? '<tr><td colspan="6" class="px-6 py-10 text-center">Veritabanında kayıtlı iplik bulunamadı.</td></tr>' : '';

                data.forEach(satir => {
                    const enerji = (satir.kw_tuketim || 0) * kwFiyat;
                    const iscilik = (satir.iscilik || 0) * (iscilikEndeks / 100);
                    const net = enerji + iscilik;
                    const satis = net * (1 + (karOrani / 100));

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50 transition-colors";
                    tr.innerHTML = `
                        <td class="px-6 py-4 text-sm font-bold text-slate-800">${satir.iplik_tipi}</td>
                        <td class="px-6 py-4 text-sm text-blue-600 font-semibold">${satir.denye}</td>
                        <td class="px-6 py-4 text-sm font-mono text-slate-500">${enerji.toFixed(3)}</td>
                        <td class="px-6 py-4 text-sm font-mono text-slate-500">${iscilik.toFixed(3)}</td>
                        <td class="px-6 py-4 text-sm font-bold text-blue-800">${net.toFixed(3)}</td>
                        <td class="px-6 py-4 text-sm font-bold text-green-700">${satis.toFixed(3)}</td>`;
                    tablo.appendChild(tr);
                });
            } catch (error) {
                tablo.innerHTML = '<tr><td colspan="6" class="px-6 py-10 text-center text-red-500">Hata: Veritabanı bağlantısı kurulamadı.</td></tr>';
            }
        }
    </script>
</body>
</html>
