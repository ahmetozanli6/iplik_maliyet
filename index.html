<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İplik Üretim ERP - USD Maliyet Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .usd-gradient { background: linear-gradient(135deg, #064e3b 0%, #065f46 100%); }
        .data-row:hover { background-color: #f0fdf4; transition: all 0.2s; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-7xl mx-auto py-8 px-4">
        <header class="usd-gradient rounded-3xl p-8 mb-8 shadow-2xl text-white relative overflow-hidden">
            <div class="relative z-10 flex flex-col md:flex-row justify-between items-center">
                <div>
                    <h1 class="text-4xl font-black tracking-tighter flex items-center gap-3">
                        <span class="bg-white text-emerald-900 rounded-2xl w-12 h-12 flex items-center justify-center shadow-lg">$</span>
                        Üretim Maliyet Otomasyonu
                    </h1>
                    <p class="mt-2 text-emerald-100 font-bold opacity-90 uppercase tracking-[0.3em] text-xs">
                        Krep • Flash • Kar • Düz Büküm | USD Bazlı Canlı Hesaplama
                    </p>
                </div>
                <div class="mt-4 md:mt-0 text-right">
                    <span id="live_clock" class="text-sm font-mono bg-black/20 px-4 py-2 rounded-full border border-white/10"></span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">⚡ Enerji ($/kW)</label>
                <input type="number" id="kw_fiyat" value="0.125" step="0.001" class="w-full text-2xl font-black text-emerald-600 outline-none">
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">👥 İşçilik Endeksi (%)</label>
                <input type="number" id="iscilik_fiyat" value="100" class="w-full text-2xl font-black text-blue-600 outline-none">
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">📈 Hedef Kâr (%)</label>
                <input type="number" id="kar_orani" value="25" class="w-full text-2xl font-black text-orange-600 outline-none">
            </div>
            <button onclick="maliyetHesapla()" class="bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl font-black uppercase tracking-widest shadow-lg shadow-emerald-200 transition-all active:scale-95">
                USD Hesapla
            </button>
        </div>

        <div class="bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-900 text-slate-400 text-[10px] uppercase font-black tracking-[0.2em]">
                            <th class="p-6">İplik Teknik Veri</th>
                            <th class="p-6">Elektrik ($)</th>
                            <th class="p-6">İşçilik ($)</th>
                            <th class="p-6">Amort. + Sarf ($)</th>
                            <th class="p-6 text-emerald-400">Net Maliyet ($)</th>
                            <th class="p-6 text-white bg-emerald-800">Satış Fiyatı ($)</th>
                        </tr>
                    </thead>
                    <tbody id="sonuc_tablosu" class="divide-y divide-slate-100 font-medium">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nejpygqdwbjuwsauacsw.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lanB5Z3Fkd2JqdXdzYXVhY3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQzNzQsImV4cCI6MjA5MjE5MDM3NH0.bJuosfe7jqbu4RvsCtV2I-GK8Xsh2oeNRvIXDXoCYD8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        setInterval(() => {
            document.getElementById('live_clock').innerText = new Date().toLocaleString('tr-TR');
        }, 1000);

        async function maliyetHesapla() {
            const tablo = document.getElementById('sonuc_tablosu');
            tablo.innerHTML = '<tr><td colspan="6" class="p-20 text-center animate-pulse text-slate-400 font-black uppercase tracking-widest text-xl">USD Verileri Hesaplanıyor...</td></tr>';

            const kwBirimUsd = parseFloat(document.getElementById('kw_fiyat').value) || 0;
            const iscilikCarpan = parseFloat(document.getElementById('iscilik_fiyat').value) / 100;
            const karOrani = 1 + (parseFloat(document.getElementById('kar_orani').value) / 100);

            try {
                const { data, error } = await supabaseClient.from('iplik_maliyetleri').select('*');
                if (error) throw error;

                tablo.innerHTML = '';
                data.forEach(s => {
                    // EXCEL FORMÜLİZASYONU (USD BAZLI)
                    const elektrikMaliyet = (s.kw_tuketim || 0) * kwBirimUsd;
                    const iscilikMaliyet = (s.iscilik || 0) * iscilikCarpan;
                    
                    // Görseldeki Sabit USD Giderleri (Kg başına)
                    const sabitGiderler = (s.amortisman || 0.385) + (s.bobin || 0.10) + (s.paketleme || 0.15) + (s.genel_gider || 0.10) + (s.reklamasyon || 0.02);

                    const netMaliyetUsd = elektrikMaliyet + iscilikMaliyet + sabitGiderler;
                    const satisFiyatiUsd = netMaliyetUsd * karOrani;

                    const tr = document.createElement('tr');
                    tr.className = "data-row";
                    tr.innerHTML = `
                        <td class="p-6">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-emerald-600 uppercase tracking-tighter">${s.iplik_tipi}</span>
                                <span class="text-xl font-black text-slate-800">${s.denye} Denye</span>
                                <span class="text-[10px] text-slate-400 font-bold">${s.tur || 0} TUR / ${s.mt_d || 0} MT/D</span>
                            </div>
                        </td>
                        <td class="p-6 font-mono text-slate-500 font-bold">$ ${elektrikMaliyet.toFixed(4)}</td>
                        <td class="p-6 font-mono text-slate-500 font-bold">$ ${iscilikMaliyet.toFixed(4)}</td>
                        <td class="p-6 font-mono text-slate-500 font-bold">$ ${sabitGiderler.toFixed(4)}</td>
                        <td class="p-6 font-black text-emerald-900 text-xl">$ ${netMaliyetUsd.toFixed(3)}</td>
                        <td class="p-6 font-black text-white bg-emerald-700/90 text-2xl shadow-inner">$ ${satisFiyatiUsd.toFixed(3)}</td>
                    `;
                    tablo.appendChild(tr);
                });

            } catch (err) {
                tablo.innerHTML = '<tr><td colspan="6" class="p-20 text-center text-red-500 font-black">SİSTEM HATASI: VERİTABANI BAĞLANAMADI</td></tr>';
            }
        }

        maliyetHesapla();
    </script>
</body>
</html>
