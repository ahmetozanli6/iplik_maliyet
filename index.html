<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İplik ERP - Canlı Senkronize Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }</style>
</head>
<body class="pb-12">

    <header class="bg-slate-900 text-white py-6 px-6 shadow-lg mb-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-tight uppercase">İplik Üretim Paneli</h1>
                <p class="text-emerald-400 text-xs font-bold uppercase tracking-widest mt-1">Bulut Veritabanı (Supabase) Aktif</p>
            </div>
            <nav class="flex gap-2">
                <a href="index.html" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold text-sm">Hesaplama Motoru</a>
                <a href="hammadde.html" class="bg-slate-800 text-slate-300 px-6 py-2 rounded-lg font-bold text-sm border border-slate-700">Fiyat Listesi Aktar</a>
            </nav>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8" id="hesap_alani">
        <div class="lg:col-span-8 space-y-6">
            <div class="bg-white p-6 rounded-xl border border-blue-200 shadow-sm">
                <h2 class="text-blue-700 font-black text-xs uppercase mb-4 border-b pb-2">1. Kapasite ve Hız</h2>
                <div class="mb-4">
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">İplik Cinsi Seçin (Buluttan Çekilir)</label>
                    <input type="text" id="v_iplik_tipi" list="iplik_listesi" placeholder="Yükleniyor..." class="w-full bg-slate-50 border p-3 rounded-lg font-bold uppercase" oninput="fiyatGetir(this.value)">
                    <datalist id="iplik_listesi"></datalist>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div><label class="text-[10px] font-bold">Denye</label><input type="number" id="v_denye" value="20" class="w-full border p-2 rounded font-bold bg-blue-50"></div>
                    <div><label class="text-[10px] font-bold">Tur</label><input type="number" id="v_tur" value="800" class="w-full border p-2 rounded font-bold bg-blue-50"></div>
                    <div><label class="text-[10px] font-bold">Devir</label><input type="number" id="v_devir" value="10000" class="w-full border p-2 rounded font-bold"></div>
                    <div><label class="text-[10px] font-bold text-emerald-600">Hız (MT/D)</label><input type="number" id="v_mtd" value="25" class="w-full border p-2 rounded font-bold border-emerald-300"></div>
                    <div><label class="text-[10px] font-bold">İğ Sayısı</label><input type="number" id="v_ig" value="256" class="w-full border p-2 rounded font-bold"></div>
                    <div><label class="text-[10px] font-bold">Gün</label><input type="number" id="v_gun" value="28" class="w-full border p-2 rounded font-bold"></div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl border border-orange-200 shadow-sm">
                <h2 class="text-orange-700 font-black text-xs uppercase mb-4 border-b pb-2">2. İşçilik Sabitleri (Excel Uyumlu)</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 bg-orange-50 p-4 rounded-lg">
                    <div><label class="text-[10px] font-bold">Personel</label><input type="number" id="v_personel" value="64" class="w-full border p-2 rounded font-bold"></div>
                    <div><label class="text-[10px] font-bold">Maaş ($)</label><input type="number" id="v_maas" value="900" class="w-full border p-2 rounded font-bold"></div>
                    <div><label class="text-[10px] font-bold">Çarpan</label><input type="number" id="v_carpan" value="1.1" step="0.1" class="w-full border p-2 rounded font-bold"></div>
                    <div><label class="text-[10px] font-bold">Makine</label><input type="number" id="v_makine" value="102" class="w-full border p-2 rounded font-bold border-orange-300"></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                    <div><label class="text-[10px] font-bold">Hammadde ($)</label><input type="number" id="v_hammadde" value="0.964" step="0.001" class="w-full border p-2 rounded font-bold"></div>
                    <div><label class="text-[10px] font-bold">Fire (%)</label><input type="number" id="v_fire" value="0" class="w-full border p-2 rounded font-bold"></div>
                    <div><label class="text-[10px] font-bold">Makine KW</label><input type="number" id="v_saatlik_kw" value="6.5" class="w-full border p-2 rounded font-bold"></div>
                    <div><label class="text-[10px] font-bold">KW Fiyat ($)</label><input type="number" id="v_kw_birim" value="0.148" class="w-full border p-2 rounded font-bold"></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-900 rounded-xl p-6 text-white shadow-2xl sticky top-6">
                <h3 class="text-center text-[10px] font-black text-slate-500 mb-6 uppercase tracking-widest border-b border-slate-800 pb-2">CANLI MALİYET ANALİZİ</h3>
                <div class="space-y-4 text-sm">
                    <div class="flex justify-between"><span>Hammadde</span><span id="r_hammadde" class="text-emerald-400 font-bold">$0.000</span></div>
                    <div class="flex justify-between"><span>Elektrik</span><span id="r_enerji" class="text-blue-400 font-bold">$0.000</span></div>
                    <div class="flex justify-between"><span>İşçilik</span><span id="r_iscilik" class="text-orange-400 font-bold">$0.000</span></div>
                    
                    <div class="bg-slate-800 p-6 rounded-lg text-center mt-6 shadow-inner border border-slate-700">
                        <span class="text-[10px] text-slate-500 uppercase block mb-1">NET MALİYET</span>
                        <span id="r_net" class="text-5xl font-black tracking-tighter text-white">0.000</span>
                    </div>

                    <div class="pt-4 border-t border-slate-800">
                        <div class="bg-emerald-900/30 p-4 rounded-lg border border-emerald-500/30 text-center">
                            <span class="text-emerald-500 text-[10px] block mb-1 font-black">SATIŞ FİYATI (%50 Kâr)</span>
                            <span id="r_satis" class="text-5xl font-black text-emerald-400">0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SUPABASE AYARLARI (Burayı Kendi Bilgilerinle Doldur)
        const SUPABASE_URL = 'BURAYA_SUPABASE_URL_GELECEK';
        const SUPABASE_KEY = 'BURAYA_SUPABASE_ANON_KEY_GELECEK';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let bulutFiyatlari = [];

        // Hız/Devir Bağlantısı
        document.getElementById('v_mtd').addEventListener('input', function() {
            let tur = parseFloat(document.getElementById('v_tur').value) || 1;
            document.getElementById('v_devir').value = Math.round((this.value * tur) / 2);
            hesapla();
        });
        document.getElementById('v_devir').addEventListener('input', function() {
            let tur = parseFloat(document.getElementById('v_tur').value) || 1;
            document.getElementById('v_mtd').value = ((this.value * 2) / tur).toFixed(2);
            hesapla();
        });

        async function buluttanVeriCek() {
            const { data, error } = await supabase.from('iplik_fiyatlari').select('*');
            if (!error) {
                bulutFiyatlari = data;
                const dl = document.getElementById('iplik_listesi');
                dl.innerHTML = "";
                data.forEach(i => { let o = document.createElement('option'); o.value = i.cins; dl.appendChild(o); });
                document.getElementById('v_iplik_tipi').placeholder = "İplik ara...";
            }
        }

        function fiyatGetir(cins) {
            const es = bulutFiyatlari.find(i => i.cins === cins.toUpperCase());
            if(es) {
                document.getElementById('v_hammadde').value = parseFloat(es.fiyat);
                hesapla();
            }
        }

        function hesapla() {
            const d = parseFloat(document.getElementById('v_denye').value) || 0;
            const mtd = parseFloat(document.getElementById('v_mtd').value) || 0;
            const ig = parseFloat(document.getElementById('v_ig').value) || 256;
            const gun = parseFloat(document.getElementById('v_gun').value) || 28;
            
            let gunKg = mtd * 60 * 24 * (d / 9000) * ig / 1000;
            let ayKg = gunKg * gun;

            const hmd = (parseFloat(document.getElementById('v_hammadde').value) || 0) * (1 + (parseFloat(document.getElementById('v_fire').value)/100));
            const elk = gunKg > 0 ? ((parseFloat(document.getElementById('v_saatlik_kw').value) * 24 / gunKg) * parseFloat(document.getElementById('v_kw_birim').value)) : 0;
            
            let fabIscilik = 64 * 900 * 1.1; // Sabit Excel Formülü
            let kgIscilik = ayKg > 0 ? (fabIscilik / 102) / ayKg : 0;

            const net = hmd + elk + kgIscilik + 0.50; // +0.50 Amortisman/Sarf tahmini
            
            document.getElementById('r_hammadde').innerText = "$" + hmd.toFixed(3);
            document.getElementById('r_enerji').innerText = "$" + elk.toFixed(3);
            document.getElementById('r_iscilik').innerText = "$" + kgIscilik.toFixed(3);
            document.getElementById('r_net').innerText = net.toFixed(3);
            document.getElementById('r_satis').innerText = (net * 1.5).toFixed(2);
        }

        window.onload = () => {
            buluttanVeriCek();
            document.getElementById('hesap_alani').addEventListener('input', hesapla);
        };
    </script>
</body>
</html>
