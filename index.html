<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İplik ERP v12.0 - Garanti Hesaplama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .erp-header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        /* MOBİL LİSTE - DAHA BÜYÜK VE GARANTİ GÖRÜNÜR */
        #mobile-dropdown {
            max-height: 350px;
            overflow-y: auto;
            position: absolute;
            z-index: 9999;
            width: 100%;
            background: white;
            border: 3px solid #3b82f6;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-top: 4px;
        }
        .dropdown-item {
            padding: 18px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1e293b;
        }
        .dropdown-item:active { background-color: #3b82f6; color: white; }
        input { font-size: 16px !important; border: 2px solid #cbd5e1; border-radius: 10px; padding: 12px; font-weight: 800; text-align: center; width: 100%; }
        input:focus { border-color: #3b82f6 !important; outline: none; background: white; }
        .result-panel { background: #0f172a; border-radius: 32px; padding: 30px; color: white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); }
    </style>
</head>
<body class="pb-10">

    <header class="erp-header text-white p-6 sticky top-0 z-50 shadow-xl text-center">
        <h1 class="text-xl font-black uppercase tracking-tighter italic">İplik Pro ERP v12</h1>
        <p class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest mt-1">Hassas Matematiksel Hesaplama Motoru</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-7 space-y-4">
                <div class="bg-white p-5 rounded-2xl border-4 border-blue-500 shadow-lg relative">
                    <label class="block text-[11px] font-black text-blue-600 uppercase mb-3 text-center tracking-widest underline">İPLİK LİSTESİNDEN SEÇİM YAPIN</label>
                    <div class="relative">
                        <input type="text" id="v_iplik_tipi" autocomplete="off" placeholder="Buraya yazın, altta liste çıkacak..." class="w-full bg-blue-50/50 uppercase">
                        <div id="mobile-dropdown" class="hidden"></div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm grid grid-cols-2 gap-4">
                    <div class="col-span-2 bg-emerald-50 p-4 rounded-xl border-2 border-emerald-200 text-center">
                        <label class="text-[11px] font-black text-emerald-600 uppercase block mb-1">Hammadde Birim Fiyatı ($)</label>
                        <input type="number" id="v_hammadde" value="0.000" step="0.001" class="border-none bg-transparent text-4xl font-black focus:ring-0">
                    </div>
                    <div><label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Denye</label><input type="number" id="v_denye" value="20"></div>
                    <div><label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Tur (Metre Büküm)</label><input type="number" id="v_tur" value="800"></div>
                    <div class="bg-indigo-50 p-3 rounded-xl border-2 border-indigo-100">
                        <label class="text-[10px] font-bold text-indigo-600 uppercase block mb-1">Hız (MT/DK)</label>
                        <input type="number" id="v_mtd" value="25" class="text-indigo-700 border-indigo-200" oninput="hizDegisti()">
                    </div>
                    <div class="bg-indigo-50 p-3 rounded-xl border-2 border-indigo-100">
                        <label class="text-[10px] font-bold text-indigo-600 uppercase block mb-1">Devir (RPM)</label>
                        <input type="number" id="v_devir" value="10000" class="text-indigo-700 border-indigo-200" oninput="devirDegisti()">
                    </div>
                </div>

                <details class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                    <summary class="p-4 text-[10px] font-black text-slate-500 uppercase cursor-pointer bg-slate-50 text-center">İşçilik ve Sabit Gider Ayarları (Excel)</summary>
                    <div class="p-4 grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div><label class="text-[9px] font-bold uppercase">Personel</label><input type="number" id="v_personel" value="64"></div>
                        <div><label class="text-[9px] font-bold uppercase">Maaş ($)</label><input type="number" id="v_maas" value="900"></div>
                        <div><label class="text-[9px] font-bold uppercase">Makine</label><input type="number" id="v_makine" value="102"></div>
                        <div><label class="text-[9px] font-bold uppercase">İğ Sayısı</label><input type="number" id="v_ig" value="256"></div>
                    </div>
                </details>
            </div>

            <div class="lg:col-span-5">
                <div class="result-panel sticky top-28">
                    <div class="text-center mb-10 border-b border-slate-800 pb-10">
                        <span class="text-blue-500 text-[11px] font-black uppercase tracking-[0.6em]">NET ÜRETİM MALİYETİ</span>
                        <div class="text-8xl font-black mt-4 flex justify-center items-baseline leading-none">
                            <span class="text-2xl text-blue-600 font-normal mr-1">$</span><span id="r_net">0.000</span>
                        </div>
                    </div>
                    <div class="space-y-5 mb-10">
                        <div class="flex justify-between items-center bg-slate-800/50 p-5 rounded-2xl border border-slate-800">
                            <span class="text-slate-500 text-[11px] font-black uppercase tracking-widest">Hammadde (Fireli)</span>
                            <span id="r_hammadde" class="text-emerald-400 font-black text-2xl">$0.000</span>
                        </div>
                        <div class="flex justify-between items-center bg-slate-800/50 p-5 rounded-2xl border border-slate-800">
                            <span class="text-slate-500 text-[11px] font-black uppercase tracking-widest">İşçilik Payı</span>
                            <span id="r_iscilik" class="text-orange-400 font-black text-2xl">$0.000</span>
                        </div>
                    </div>
                    <div class="bg-emerald-600 p-6 rounded-3xl text-center shadow-lg active:scale-95 transition-all cursor-pointer">
                        <span class="block text-[10px] text-emerald-950 font-black uppercase opacity-60 mb-1 tracking-tighter">Tavsiye Satış Fiyatı (%50)</span>
                        <span id="r_satis" class="text-4xl font-black text-white">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // SUPABASE AYARLARI
        const SUPABASE_URL = 'https://nejpygqdwbjuwsauacsw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lanB5Z3Fkd2JqdXdzYXVhY3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQzNzQsImV4cCI6MjA5MjE5MDM3NH0.bJuosfe7jqbu4RvsCtV2I-GK8Xsh2oeNRvIXDXoCYD8';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let iplikData = [];

        async function verileriGetir() {
            const { data } = await client.from('iplik_fiyatlari').select('*');
            if (data) iplikData = data;
        }

        // --- GARANTİ SEÇİM VE HESAPLAMA MOTORU ---
        const inputIplik = document.getElementById('v_iplik_tipi');
        const dropdown = document.getElementById('mobile-dropdown');

        inputIplik.addEventListener('input', function(e) {
            const val = e.target.value.toUpperCase();
            dropdown.innerHTML = "";
            if (val.length < 1) { dropdown.classList.add('hidden'); return; }

            const filtrelenmis = iplikData.filter(i => i.cins.includes(val)).slice(0, 20);
            if (filtrelenmis.length > 0) {
                dropdown.classList.remove('hidden');
                filtrelenmis.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "dropdown-item";
                    div.innerHTML = `<span>${item.cins}</span><span class="text-blue-600">$${item.fiyat}</span>`;
                    div.onclick = function() {
                        inputIplik.value = item.cins;
                        document.getElementById('v_hammadde').value = parseFloat(item.fiyat);
                        dropdown.classList.add('hidden');
                        // GARANTİ TETİKLEME: Hem input olayı hem doğrudan fonksiyon
                        hesapla();
                    };
                    dropdown.appendChild(div);
                });
            } else { dropdown.classList.add('hidden'); }
        });

        // HIZ VE DEVİR MATEMATİĞİ (TFO FORMÜLÜ)
        function devirDegisti() {
            let t = parseFloat(document.getElementById('v_tur').value) || 1;
            let d = parseFloat(document.getElementById('v_devir').value) || 0;
            document.getElementById('v_mtd').value = ((d * 2) / t).toFixed(2);
            hesapla();
        }

        function hizDegisti() {
            let t = parseFloat(document.getElementById('v_tur').value) || 1;
            let m = parseFloat(document.getElementById('v_mtd').value) || 0;
            document.getElementById('v_devir').value = Math.round((m * t) / 2);
            hesapla();
        }

        // ANA HESAPLAMA (GARANTİ MATEMATİK)
        function hesapla() {
            const hmd = parseFloat(document.getElementById('v_hammadde').value) || 0;
            const denye = parseFloat(document.getElementById('v_denye').value) || 0;
            const mtd = parseFloat(document.getElementById('v_mtd').value) || 0;
            const ig = parseFloat(document.getElementById('v_ig').value) || 256;
            const person = parseFloat(document.getElementById('v_personel').value) || 64;
            const maas = parseFloat(document.getElementById('v_maas').value) || 900;
            const makine = parseFloat(document.getElementById('v_makine').value) || 102;

            // 1. Kapasite Hesabı
            let gunlukKg = mtd * 60 * 24 * (denye / 9000) * ig / 1000;
            let aylikKg = gunlukKg * 28;

            // 2. İşçilik Hesabı (Dinamik Excel Formülü)
            let fabYuku = person * maas * 1.1; 
            let kgIscilik = aylikKg > 0 ? (fabYuku / makine) / aylikKg : 0;
            
            // 3. Enerji Hesabı (6.5 kW sabiti)
            let kgEnerji = gunlukKg > 0 ? (6.5 * 24 / gunlukKg) * 0.148 : 0;

            const netMaliyet = hmd + kgIscilik + kgEnerji + 0.45;

            // Ekrana Kesin Yazdırma
            document.getElementById('r_net').innerText = netMaliyet.toFixed(3);
            document.getElementById('r_iscilik').innerText = "$" + kgIscilik.toFixed(3);
            document.getElementById('r_hammadde').innerText = "$" + hmd.toFixed(3);
            document.getElementById('r_satis').innerText = "$" + (netMaliyet * 1.5).toFixed(2);
        }

        // TÜM GİRDİLERİ DİNLE
        document.body.addEventListener('input', function(e) {
            if (e.target.tagName === 'INPUT') hesapla();
        });

        window.onload = () => { verileriGetir(); setTimeout(hesapla, 1000); };
        
        // Boşluğa basınca kapat
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.relative')) dropdown.classList.add('hidden');
        });
    </script>
</body>
</html>
