<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İplik ERP - Teknik Maliyet Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .erp-header { background: linear-gradient(135deg, #0f172a 0%, #334155 100%); }
        .usd-tag { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-7xl mx-auto py-6 px-4">
        <header class="erp-header rounded-2xl p-8 mb-6 shadow-xl text-white">
            <div class="flex flex-col md:flex-row justify-between items-center text-center md:text-left">
                <div>
                    <h1 class="text-3xl font-black tracking-tight tracking-widest">İPLİK MALİYET OTOMASYONU</h1>
                    <p class="text-slate-400 text-sm font-bold mt-1">GÖRSELDEKİ TEKNİK FORMÜLİZASYON UYGULANMIŞTIR</p>
                </div>
                <div class="mt-4 md:mt-0 bg-white/10 px-6 py-3 rounded-xl border border-white/20">
                    <span class="text-xs block text-slate-300 font-bold uppercase">Global Valuta</span>
                    <span class="text-2xl font-black text-emerald-400">USD ($)</span>
                </div>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">⚡ Elektrik Birim ($/kW)</label>
                    <input type="number" id="kw_birim" value="0.12" step="0.01" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 font-bold text-emerald-700 outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">👥 İşçi Sayısı (48*1.1)</label>
                    <input type="number" id="isci_sayisi" value="52.8" step="0.1" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 font-bold text-blue-700 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">💰 Ortalama Maaş ($)</label>
                    <input type="number" id="maas_baz" value="666" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-3 font-bold text-blue-700 outline-none">
                </div>
                <div class="flex items-end">
                    <button onclick="maliyetHesapla()" class="w-full bg-slate-900 hover:bg-black text-white font-black py-3 rounded-lg shadow-lg transition-all active:scale-95 uppercase tracking-widest">
                        HESAPLA
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-900 text-slate-400 font-black uppercase text-[10px]">
                    <tr>
                        <th class="p-5 border-b border-slate-800">Üretim Bilgisi</th>
                        <th class="p-5 border-b border-slate-800">Günlük Üretim (Kg)</th>
                        <th class="p-5 border-b border-slate-800 text-emerald-400">Elektrik ($)</th>
                        <th class="p-5 border-b border-slate-800 text-blue-400">İşçilik ($)</th>
                        <th class="p-5 border-b border-slate-800">Sarf+Genel ($)</th>
                        <th class="p-5 border-b border-slate-800 bg-emerald-900 text-white">YENİ MALİYET ($)</th>
                    </tr>
                </thead>
                <tbody id="sonuc_tablosu" class="divide-y divide-slate-100 font-medium">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nejpygqdwbjuwsauacsw.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5lanB5Z3Fkd2JqdXdzYXVhY3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQzNzQsImV4cCI6MjA5MjE5MDM3NH0.bJuosfe7jqbu4RvsCtV2I-GK8Xsh2oeNRvIXDXoCYD8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function maliyetHesapla() {
            const tablo = document.getElementById('sonuc_tablosu');
            tablo.innerHTML = '<tr><td colspan="6" class="p-20 text-center font-bold text-slate-400 animate-pulse">VERİLER HESAPLANIYOR...</td></tr>';

            const kwFiyat = parseFloat(document.getElementById('kw_birim').value) || 0;
            const isciSayisi = parseFloat(document.getElementById('isci_sayisi').value) || 52.8;
            const maasBaz = parseFloat(document.getElementById('maas_baz').value) || 666;

            try {
                const { data, error } = await supabaseClient.from('iplik_maliyetleri').select('*');
                if (error) throw error;

                tablo.innerHTML = '';
                data.forEach(s => {
                    // GÖRSELDEKİ FORMÜL: ELEKTRİK = KW TÜKETİM * KW BİRİM
                    const elektrikUsd = (s.kw_tuketim || 0) * kwFiyat;
                    
                    // GÖRSELDEKİ FORMÜL: İŞÇİLİK = (İŞÇİ SAYISI * MAAŞ) / AYLIK ÜRETİM
                    // Not: Aylık üretim s.aylik_uretim sütunundan gelmeli, yoksa varsayılan alınır
                    const aylikUretim = s.aylik_uretim || 3000; 
                    const iscilikUsd = (isciSayisi * maasBaz) / aylikUretim;

                    // GÖRSELDEKİ TOPLAM SARF (Bobin, Etiket, Paketleme, Amortisman, Genel Gider)
                    const sarfGiderUsd = (s.amortisman || 0.385) + (s.bobin || 0.10) + (s.paketleme || 0.15) + (s.genel_gider || 0.10) + (s.reklamasyon || 0.02);

                    const yeniMaliyet = elektrikUsd + iscilikUsd + sarfGiderUsd;

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50 transition-colors";
                    tr.innerHTML = `
                        <td class="p-5">
                            <span class="block text-[10px] font-black text-slate-400 uppercase tracking-tighter">${s.iplik_tipi}</span>
                            <span class="text-base font-black text-slate-800">${s.denye} Denye</span>
                            <span class="block text-[10px] text-blue-600 font-bold uppercase">${s.tur || 0} Tur / ${s.mt_d || 0} MT/D</span>
                        </td>
                        <td class="p-5 font-mono text-slate-600">${(s.gunluk_uretim || 0).toFixed(2)} Kg</td>
                        <td class="p-5 font-mono font-bold text-emerald-600">$ ${elektrikUsd.toFixed(4)}</td>
                        <td class="p-6 font-mono font-bold text-blue-600">$ ${iscilikUsd.toFixed(4)}</td>
                        <td class="p-5 font-mono text-slate-500">$ ${sarfGiderUsd.toFixed(4)}</td>
                        <td class="p-5 font-black text-white bg-emerald-800 text-xl shadow-inner">$ ${yeniMaliyet.toFixed(3)}</td>
                    `;
                    tablo.appendChild(tr);
                });
            } catch (err) {
                tablo.innerHTML = '<tr><td colspan="6" class="p-20 text-center text-red-500 font-bold uppercase">BAĞLANTI HATASI!</td></tr>';
            }
        }
        maliyetHesapla();
    </script>
</body>
</html>
